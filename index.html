<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX'); // replace with your Measurement ID
</script>

<style>
body{font-family:Arial;margin:0;background:#0b0f1a;color:white;}
header{padding:15px;background:#050814;}
nav a{margin:10px;color:white;cursor:pointer;}
.page{display:none;padding:20px;}
.btn{background:#00eaff;padding:10px;border:none;cursor:pointer;}
.stat{margin:10px 0;}
#loginModal{display:none;padding:20px;background:#121212;position:fixed;top:30%;left:50%;transform:translateX(-50%);border-radius:10px;}
input{margin:5px 0;padding:8px;width:90%;border-radius:5px;border:none;}
</style>
</head>

<body>

<header>
<h2>GIBSONFX</h2>
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Bot</a>
<a id="loginBtn">Login / SignUp</a>
<a onclick="logout()">Logout</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="page" style="display:block;">
<h1>Welcome to GIBSONFX</h1>
<p>Automated AI Trading Bot 24/7 with VIP subscription.</p>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
<h2>Dashboard</h2>
<div class="stat">Balance: <span id="balance">$0.00</span></div>
<div class="stat">Trades: <span id="tradesCount">0</span></div>
<div class="stat">VIP: <span id="vipStatus">No</span></div>
<h3>Trade Journal (Last 20 trades)</h3>
<div id="journal"></div>
</section>

<!-- BOT -->
<section id="bot" class="page">
<h2>Trading Bot</h2>
<h3 id="signal">WAIT</h3>
<button class="btn" onclick="startBot()">Start Bot</button>
<button class="btn" onclick="stopBot()">Stop Bot</button>
</section>

<!-- LOGIN / SIGNUP MODAL -->
<div id="loginModal">
<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="signup()">Sign Up</button>
<button class="btn" onclick="upgradeVIP()">Upgrade to VIP</button>
</div>

<script>
// FIREBASE CONFIG - replace with your Firebase keys
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// STATE
let balance = 0;
let tradeJournal = [];
let isVIP = false;
let botInterval;

// NAV
function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.style.display='none');
    document.getElementById(id).style.display='block';
    gtag('event','page_view',{page:id,user:auth.currentUser?.email || 'guest'});
}

// LOGIN MODAL
document.getElementById("loginBtn").onclick = ()=>{
    document.getElementById("loginModal").style.display="block";
};

// SIGNUP
function signup(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(!email || !password){ alert("Enter email and password"); return; }

    auth.createUserWithEmailAndPassword(email,password)
    .then(user=>{
        db.collection("user").doc(user.user.uid).set({
            email: email,
            balance: 100,
            vip: false,
            trades: []
        });
        alert("Account created! Balance $100 initialized.");
        gtag('event','signup',{user:email});
        document.getElementById("loginModal").style.display="none";
        loadUserData(user.user.uid);
    })
    .catch(err=>alert(err.message));
}

// LOGIN
function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    if(!email || !password){ alert("Enter email and password"); return; }

    auth.signInWithEmailAndPassword(email,password)
    .then(user=>{
        alert("Logged in!");
        gtag('event','login',{user:email});
        document.getElementById("loginModal").style.display="none";
        loadUserData(user.user.uid);
    })
    .catch(err=>alert(err.message));
}

// LOGOUT
function logout(){
    auth.signOut();
    alert("Logged out");
}

// LOAD DATA
function loadUserData(uid){
    db.collection("user").doc(uid).get()
    .then(doc=>{
        if(doc.exists){
            const data = doc.data();
            balance = Number(data.balance) || 0;
            tradeJournal = data.trades || [];
            isVIP = data.vip || false;
            updateUI();
        }
    });
}

// SAVE DATA
function saveUserData(){
    const user = auth.currentUser;
    if(!user) return;

    db.collection("user").doc(user.uid).update({
        balance: balance,
        trades: tradeJournal,
        vip: isVIP
    });
}

// UPGRADE TO VIP
function upgradeVIP(){
    if(!auth.currentUser){ alert("Login first"); return; }
    isVIP = true;
    saveUserData();
    updateUI();
    gtag('event','vip_purchase',{user:auth.currentUser.email});
    alert("VIP Activated 🔥");
}

// BOT SIGNAL
function getSignal(){
    const signals=["BUY","SELL","WAIT"];
    return signals[Math.floor(Math.random()*3)];
}

// ADD TRADE
function addTrade(signal){
    let pl=0;
    if(signal==="BUY") pl=Math.random()*2;
    if(signal==="SELL") pl=-Math.random()*2;

    balance += pl;
    tradeJournal.push({signal, pl:Number(pl.toFixed(2))});
    if(tradeJournal.length>20) tradeJournal.shift();

    saveUserData();
    updateUI();
}

// UPDATE UI
function updateUI(){
    document.getElementById("balance").innerText = "$" + Number(balance).toFixed(2);
    document.getElementById("tradesCount").innerText = tradeJournal.length;
    document.getElementById("vipStatus").innerText = isVIP ? "Yes" : "No";
    
    const journal = document.getElementById("journal");
    journal.innerHTML = "";
    tradeJournal.forEach(t=>{
        journal.innerHTML += `<p>${t.signal} | P/L: ${t.pl}%</p>`;
    });
}

// BOT CONTROL
function startBot(){
    if(!isVIP){ alert("VIP only! Upgrade to VIP to run bot."); return; }
    if(botInterval) clearInterval(botInterval);

    botInterval = setInterval(()=>{
        const s=getSignal();
        addTrade(s);
        document.getElementById("signal").innerText = s;
        gtag('event','bot_trade',{user:auth.currentUser.email,signal:s});
    },2000);
}

function stopBot(){
    clearInterval(botInterval);
    document.getElementById("signal").innerText = "WAIT";
    if(auth.currentUser) gtag('event','bot_stop',{user:auth.currentUser.email});
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
    if(user){
        loadUserData(user.uid);
    }
});
</script>

</body>
</html>
