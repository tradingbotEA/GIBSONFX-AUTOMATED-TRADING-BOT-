<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX PRO</title>

<style>
:root{
--bg-dark:#0b0f1a; --text-dark:white; --card-dark:#121a2b;
--bg-light:#f5f5f5; --text-light:#111; --card-light:#fff;
}

body{margin:0;font-family:Arial;background:var(--bg-dark);color:var(--text-dark);transition:.3s;}
body.light-mode{background:var(--bg-light);color:var(--text-light);}

header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#050814;}
nav a{margin:5px 10px;cursor:pointer;font-weight:bold;}

.page{display:none;padding:20px;}
.hero{display:flex;justify-content:space-between;flex-wrap:wrap;}
.hero img{max-width:300px;}

.btn{background:#00eaff;padding:10px 15px;border-radius:5px;color:black;cursor:pointer;border:none}

.stats{display:flex;gap:15px;flex-wrap:wrap}
.stat-card{background:var(--card-dark);padding:10px;border-radius:8px}
body.light-mode .stat-card{background:var(--card-light)}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);justify-content:center;align-items:center}
.modal-content{background:var(--card-dark);padding:20px;border-radius:10px}

</style>
</head>

<body>

<header>
<h2>GIBSONFX PRO</h2>
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Bot</a>
<a onclick="showPage('market')">Market</a>
<a id="loginLink">Login</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="page" style="display:block;">
<h1>AI Trading Platform</h1>
<p>Automated trading + academy + signals</p>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
<h2>Dashboard</h2>
<div class="stats">
<div class="stat-card">Balance: $<span id="balance">100</span></div>
<div class="stat-card">Trades: <span id="trades">0</span></div>
<div class="stat-card">Status: <span id="status">OFF</span></div>
</div>
<ul id="journal"></ul>
</section>

<!-- BOT -->
<section id="bot" class="page">
<h2>Trading Bot</h2>

<label><input type="checkbox" class="pair" value="EURUSD">EURUSD</label>
<label><input type="checkbox" class="pair" value="BTCUSD">BTCUSD</label>
<br><br>

<button class="btn" onclick="startBot()">Start</button>
<button class="btn" onclick="stopBot()">Stop</button>

<h3 id="signal">WAIT</h3>
</section>

<!-- MARKET -->
<section id="market" class="page">
<h2>Market</h2>
<div id="chart"></div>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
<div class="modal-content">
<h2>Login</h2>
<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button class="btn" onclick="login()">Login</button>
</div>
</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
// ================= STATE =================
let loggedIn=false;
let currentUser=null;
let balance=100;
let trades=0;
let bot=null;

// ================= NAV =================
function showPage(id){
if(!loggedIn && id!=="home"){
alert("Login first"); return;
}
document.querySelectorAll('.page').forEach(p=>p.style.display='none');
document.getElementById(id).style.display='block';
}

// ================= LOGIN =================
const loginLink=document.getElementById("loginLink");

loginLink.onclick=()=>{
if(loggedIn){logout();}
else document.getElementById("loginModal").style.display="flex";
};

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

let users=JSON.parse(localStorage.getItem("users"))||{};

if(!users[u]) users[u]={password:p,balance:100};

if(users[u].password!==p){alert("Wrong password");return;}

loggedIn=true;
currentUser=u;
balance=users[u].balance;

localStorage.setItem("currentUser",u);

loginLink.innerText="Logout("+u+")";
document.getElementById("loginModal").style.display="none";

updateUI();
}

function logout(){
loggedIn=false;
currentUser=null;
loginLink.innerText="Login";
localStorage.removeItem("currentUser");
}

// AUTO LOGIN
window.onload=()=>{
let u=localStorage.getItem("currentUser");
if(u){
let users=JSON.parse(localStorage.getItem("users"))||{};
if(users[u]){
loggedIn=true;
currentUser=u;
balance=users[u].balance;
loginLink.innerText="Logout("+u+")";
updateUI();
}
}
initChart();
};

// ================= BOT =================
function startBot(){
if(!loggedIn){alert("Login first");return;}

let pairs=[...document.querySelectorAll('.pair:checked')].map(e=>e.value);
if(pairs.length==0){alert("Select pair");return;}

document.getElementById("status").innerText="RUNNING";

bot=setInterval(()=>{
let sig=["BUY","SELL","WAIT"][Math.floor(Math.random()*3)];
document.getElementById("signal").innerText=sig;

let profit=(Math.random()*4-2);
balance+=balance*(profit/100);
trades++;

updateUI();

let li=document.createElement("li");
li.innerText=sig+" "+profit.toFixed(2)+"%";
document.getElementById("journal").prepend(li);

saveUser();

},2000);
}

function stopBot(){
clearInterval(bot);
document.getElementById("status").innerText="OFF";
}

// ================= DATA =================
function updateUI(){
document.getElementById("balance").innerText=balance.toFixed(2);
document.getElementById("trades").innerText=trades;
}

function saveUser(){
let users=JSON.parse(localStorage.getItem("users"))||{};
users[currentUser]={password:users[currentUser].password,balance};
localStorage.setItem("users",JSON.stringify(users));
}

// ================= CHART =================
function initChart(){
new TradingView.widget({
container_id:"chart",
symbol:"BTCUSD",
interval:"60"
});
}
</script>

</body>
</html>
