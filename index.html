<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX PRO BOT</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f1a;
    color:white;
    text-align:center;
}

/* HEADER */
header{
    padding:20px;
    background:#050814;
}
header h1{
    color:#00eaff;
}

/* HERO */
.hero{
    padding:50px 20px;
}

/* DASHBOARD */
.stats{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}
.stat{
    background:#121a2b;
    padding:20px;
    border-radius:10px;
    width:200px;
}

/* BOT */
.bot{
    margin-top:30px;
}
button{
    padding:12px 25px;
    margin:10px;
    background:#00eaff;
    border:none;
    border-radius:6px;
    font-weight:bold;
}
button:hover{
    box-shadow:0 0 15px #00eaff;
}

/* SIGNAL */
#signal{
    font-size:40px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
<h1>GIBSONFX AI TRADING BOT</h1>
<p>Automated Smart Trading System</p>
</header>

<section class="hero">
<h2>Live Trading Dashboard</h2>

<div class="stats">
<div class="stat">
<h3>Balance</h3>
<p id="balance">$12,450</p>
</div>

<div class="stat">
<h3>Price (XAUUSD)</h3>
<p id="price">1900.00</p>
</div>

<div class="stat">
<h3>Profit</h3>
<p id="profit">$0.00</p>
</div>

<div class="stat">
<h3>Status</h3>
<p id="status">Stopped</p>
</div>
</div>

<div class="bot">
<h2>Signal</h2>
<div id="signal">WAIT</div>

<button onclick="startBot()">Start Bot</button>
<button onclick="stopBot()">Stop Bot</button>
</div>

</section>

<script>
let running = false;
let price = 1900;
let profit = 0;
let balance = 12450;

function getSignal(prev, current){
    if(current > prev + 1.5) return "BUY";
    if(current < prev - 1.5) return "SELL";
    return "WAIT";
}

function startBot(){
    if(running) return;

    running = true;
    document.getElementById("status").innerText = "Running";

    window.bot = setInterval(()=>{
        let prev = price;

        // simulate price
        price += (Math.random() - 0.5) * 5;

        let signal = getSignal(prev, price);
        let el = document.getElementById("signal");

        el.innerText = signal;

        if(signal === "BUY"){
            el.style.color = "lime";
            profit += Math.random() * 30;
        }
        else if(signal === "SELL"){
            el.style.color = "red";
            profit += Math.random() * 25;
        }
        else{
            el.style.color = "white";
        }

        document.getElementById("price").innerText = price.toFixed(2);
        document.getElementById("profit").innerText = "$" + profit.toFixed(2);
        document.getElementById("balance").innerText = "$" + (balance + profit).toFixed(2);

    }, 2000);
}

function stopBot(){
    running = false;
    clearInterval(window.bot);

    document.getElementById("status").innerText = "Stopped";
    document.getElementById("signal").innerText = "WAIT";
}
</script>

</body>
</html>
