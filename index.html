<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GIBSONFX Elite PRO AI</title><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><!-- TradingView --><script src="https://s3.tradingview.com/tv.js"></script><!-- 🔥 YOUR REAL BOT ENGINE --><script src="./js/bot-engine.js"></script><style>
:root{--bg:#0b0f1a;--card:#121a2b;--gold:#FFD700}
body{margin:0;font-family:sans-serif;background:linear-gradient(135deg,#0b0f1a,#121a2b);color:#fff}
header{display:flex;justify-content:space-between;padding:15px;background:rgba(0,0,0,.7)}
nav a{margin:5px;cursor:pointer}
.page{display:none;padding:20px}
.card{background:var(--card);padding:15px;border-radius:10px;margin-bottom:15px}
.btn{background:var(--gold);border:none;padding:10px;cursor:pointer;margin:5px}
</style></head><body><header>
<h2>GIBSONFX</h2>
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Bot</a>
<a onclick="showPage('market')">Market</a>
<a onclick="showPage('review')">Review</a>
<a onclick="showPage('academy')">Academy</a>
<a onclick="showPage('team')">Team</a>
<a onclick="showPage('gallery')">Gallery</a>
<a onclick="showPage('deposit')">Deposit</a>
<a onclick="showPage('withdraw')">Withdraw</a>
<a onclick="showPage('vip')">VIP</a>
<a onclick="loginPrompt()">Login</a>
</nav>
</header><!-- HOME --><section id="home" class="page" style="display:block">
<h1>GIBSONFX AI Trading Platform</h1>
</section><!-- DASHBOARD --><section id="dashboard" class="page">
<div class="card">Balance: <span id="bal">$0</span></div>
<div class="card">Total Trades: <span id="trades">0</span></div>
<div class="card">Win Rate: <span id="winrate">0%</span></div>
</section><!-- BOT --><section id="bot" class="page">
<div class="card">
<button class="btn" onclick="startBot()">Start Bot</button>
<button class="btn" onclick="stopBot()">Stop Bot</button>
<p>Status: <span id="botState">Stopped</span></p>
</div>
</section><!-- MARKET --><section id="market" class="page"><div id="c1" style="height:300px"></div></section>
<section id="review" class="page"><div id="c2" style="height:300px"></div></section><section id="academy" class="page"><h2>Academy</h2></section>
<section id="team" class="page"><h2>Team</h2></section>
<section id="gallery" class="page"><h2>Gallery</h2></section><!-- VIP --><section id="vip" class="page">
<h2>VIP Access</h2>
<button class="btn" onclick="upgradeVIP()">Unlock VIP</button>
<p id="vipStatus">Not VIP</p>
</section><section id="deposit" class="page">
<input id="dep" type="number" placeholder="amount" />
<button class="btn" onclick="deposit()">Deposit</button>
</section><section id="withdraw" class="page">
<input id="withd" type="number" placeholder="amount" />
<button class="btn" onclick="withdraw()">Withdraw</button>
</section><script>
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.style.display='none');document.getElementById(id).style.display='block'}

// FIREBASE
const firebaseConfig={apiKey:"AIzaSy...",authDomain:"gibsonfx-web.firebaseapp.com",projectId:"gibsonfx-web"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();const db=firebase.firestore();

let uid=null,balance=0,tradesData=[],isVIP=false;

function loginPrompt(){
const e=prompt('Email');
const p=prompt('Password');
auth.signInWithEmailAndPassword(e,p).catch(()=>auth.createUserWithEmailAndPassword(e,p));
}

auth.onAuthStateChanged(u=>{
if(u){uid=u.uid;loadUser();}
});

function loadUser(){
db.collection('users').doc(uid).get().then(d=>{
if(d.exists){
let data=d.data();
balance=data.balance||0;
tradesData=data.trades||[];
isVIP=data.vip||false;
}else{
db.collection('users').doc(uid).set({balance:0,trades:[],vip:false});
}
updateUI();
});
}

function save(){db.collection('users').doc(uid).update({balance,trades:tradesData,vip:isVIP});}

function updateUI(){
bal.innerText='$'+balance.toFixed(2);
trades.innerText=tradesData.length;
let wins=tradesData.filter(t=>t.profit>0).length;
winrate.innerText=tradesData.length?Math.round((wins/tradesData.length)*100)+'%':'0%';
vipStatus.innerText=isVIP?'VIP Active':'Not VIP';
}

function upgradeVIP(){isVIP=true;save();updateUI();}

function deposit(){balance+=parseFloat(dep.value||0);save();updateUI();}
function withdraw(){balance-=parseFloat(withd.value||0);save();updateUI();}

// 🔥 REAL BOT CONNECTION
let bot;
function startBot(){
if(!isVIP)return alert('VIP ONLY');
if(typeof GibsonFXBotEngine==='undefined')return alert('bot-engine.js missing');

bot=new GibsonFXBotEngine({
onSignal:(data)=>{
tradesData.push(data);
balance+=data.profit;
save();updateUI();
}
});

bot.start();
botState.innerText='Running';
}

function stopBot(){
if(bot){bot.stop();}
botState.innerText='Stopped';
}

// CHARTS
new TradingView.widget({container_id:'c1',symbol:'OANDA:XAUUSD'});
new TradingView.widget({container_id:'c2',symbol:'OANDA:EURUSD'});
</script></body>
</html>
