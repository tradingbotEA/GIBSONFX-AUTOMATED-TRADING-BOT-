<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>

<style>
:root{
--bg-dark:#0b0f1a; --text-dark:white; --card-dark:#121a2b;
--bg-light:#f5f5f5; --text-light:#111; --card-light:#fff;
}
body{margin:0;font-family:Arial;background:var(--bg-dark);color:white;}
body.light-mode{background:var(--bg-light);color:#111;}
header{display:flex;justify-content:space-between;padding:15px;background:#050814;}
nav{display:flex;gap:10px;}
nav a{cursor:pointer;font-weight:bold;}
.menu-btn{display:none;color:#00eaff;font-size:22px;cursor:pointer;}
.page{display:none;padding:20px;}
.hero{display:flex;justify-content:space-between;flex-wrap:wrap;}
.btn{background:#00eaff;padding:10px 15px;border:none;cursor:pointer;}
.market-card{background:#121a2b;padding:10px;border-radius:10px;margin:10px;}
iframe{width:100%;height:250px;border:none;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;}
.modal-content{background:#121a2b;padding:20px;border-radius:10px;}
.close-btn{cursor:pointer;font-size:20px;float:right;}
@media(max-width:480px){
nav{display:none;flex-direction:column;}
nav.active{display:flex;}
.menu-btn{display:block;}
}
</style>
</head>

<body>

<button onclick="toggleTheme()">Toggle Mode</button>

<header>
<h2>GIBSONFX</h2>
<span class="menu-btn" id="menuBtn">☰</span>
<nav id="navMenu">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Bot</a>
<a onclick="showPage('market')">Market</a>
<a onclick="showPage('market-review')">Review</a>
<a id="loginLink">Login</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="page" style="display:block;">
<h1>GIBSONFX AI Bot</h1>
<p>Smart trading system</p>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
<h2>Dashboard</h2>
<p id="totalBalance">$100</p>
<p id="todayProfit">$0</p>
<p id="botStatus">Stopped</p>
<div id="tradeJournal"></div>
</section>

<!-- BOT -->
<section id="bot" class="page">
<h2>Bot Control</h2>
<select id="marketChoice" multiple>
<option value="EURUSD">EURUSD</option>
<option value="GBPUSD">GBPUSD</option>
<option value="XAUUSD">XAUUSD</option>
<option value="BTCUSD">BTCUSD</option>
</select>
<br><br>
<button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>
<h3 id="liveSignal">WAIT</h3>
</section>

<!-- MARKET -->
<section id="market" class="page">
<h2>Charts</h2>
<div id="marketCards"></div>
</section>

<!-- REVIEW -->
<section id="market-review" class="page">
<h2>Signals</h2>
<p id="eurusdSignal">WAIT</p>
<p id="gbpusdSignal">WAIT</p>
<p id="xauusdSignal">WAIT</p>
<p id="btcusdSignal">WAIT</p>
</section>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal">
<div class="modal-content">
<span class="close-btn" id="closeModal">×</span>
<h3>Login</h3>
<input id="loginPassword" type="password">
<button onclick="checkLogin()">Login</button>
</div>
</div>

<!-- VIP MODAL -->
<div id="vipModal" class="modal">
<div class="modal-content">
<span class="close-btn" id="closeVip">×</span>
<p>VIP required</p>
<button onclick="payWithMpesa()">Unlock</button>
</div>
</div>

<!-- FULLSCREEN CHART -->
<div id="chartModal" class="modal">
<div class="modal-content">
<span class="close-btn" id="closeChartModal">×</span>
<iframe id="fullscreenChart"></iframe>
</div>
</div>

<script>
// STATE
let loggedIn=false, isVIP=false, botInterval=null;
let userBalance=100, tradeJournal=[];

const markets={
EURUSD:"FX:EURUSD",
GBPUSD:"FX:GBPUSD",
XAUUSD:"OANDA:XAUUSD",
BTCUSD:"BINANCE:BTCUSDT"
};

// MENU
menuBtn.onclick=()=>navMenu.classList.toggle('active');

// THEME
function toggleTheme(){document.body.classList.toggle('light-mode');}

// LOGIN
loginLink.onclick=()=>loginModal.style.display="flex";
closeModal.onclick=()=>loginModal.style.display="none";
closeVip.onclick=()=>vipModal.style.display="none";
closeChartModal.onclick=()=>chartModal.style.display="none";

function checkLogin(){
if(loginPassword.value==="GIBSONFX2026"){
loggedIn=true;
loginModal.style.display="none";
alert("Logged in");
}
}

// VIP
function payWithMpesa(){isVIP=true;vipModal.style.display="none";}

// NAVIGATION
function showPage(id){
if(!loggedIn){alert("Login first");return;}
document.querySelectorAll('.page').forEach(p=>p.style.display='none');
document.getElementById(id).style.display='block';
}

// CHARTS
function updateMarketCharts(){
marketCards.innerHTML="";
for(let key in markets){
let div=document.createElement('div');
div.className="market-card";

let iframe=document.createElement('iframe');
iframe.src=`https://s.tradingview.com/widgetembed/?symbol=${markets[key]}`;

let btn=document.createElement('button');
btn.innerText="Full";
btn.onclick=()=>{
fullscreenChart.src=iframe.src;
chartModal.style.display="flex";
};

div.append(key,iframe,btn);
marketCards.appendChild(div);
}
}

// SIGNAL LOGIC
function getAISignal(){
let rsi=Math.random()*100;
if(rsi<30)return "BUY";
if(rsi>70)return "SELL";
return "WAIT";
}

// BOT
function updateSignals(){
let selected=[...marketChoice.selectedOptions].map(o=>o.value);
selected.forEach(sym=>{
let sig=getAISignal();
document.getElementById(sym.toLowerCase()+"Signal").innerText=sig;

let pl=(Math.random()*5-2.5).toFixed(2);
tradeJournal.push(`${sym} ${sig} ${pl}`);
userBalance+=parseFloat(pl);
});
liveSignal.innerText="RUNNING";
updateDashboard();
}

function startBot(){
if(botInterval)return;
botStatus.innerText="Running";
botInterval=setInterval(updateSignals,3000);
}

function stopBot(){
clearInterval(botInterval);
botInterval=null;
botStatus.innerText="Stopped";
}

// DASHBOARD
function updateDashboard(){
totalBalance.innerText="$"+userBalance.toFixed(2);
todayProfit.innerText="Updated";
tradeJournalDiv.innerHTML=tradeJournal.join("<br>");
}

// INIT
window.onload=()=>{
updateMarketCharts();
};
</script>

</body>
</html>
