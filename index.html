<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>
<style>
/* ORIGINAL CSS UNCHANGED */
</style>
</head>
<body><!-- YOUR ORIGINAL HTML REMAINS EXACTLY THE SAME --><script>

// ================= ORIGINAL VARIABLES =================
let loggedIn=false;
let isVIP=false;
let light=false;
let botInterval=null;

// ================= ULTRA STRICT ADDITIONS =================
// (No overrides, only extensions)

let session = {
  user: null,
  isVIP: false,
  balance: 10000,
  profit: 0,
  trades: 0,
  botRunning: false
};

function saveSession(){
  localStorage.setItem("gibsonfx_session", JSON.stringify(session));
}

function loadSession(){
  const saved = localStorage.getItem("gibsonfx_session");
  if(saved){
    session = JSON.parse(saved);
    loggedIn = true;
    isVIP = session.isVIP;

    const ud=document.getElementById("userDisplay");
    if(ud){
      ud.style.display='inline';
      ud.innerText='👤 '+session.user;
    }

    if(document.getElementById('loginLink')) document.getElementById('loginLink').style.display='none';
    if(document.getElementById('signupLink')) document.getElementById('signupLink').style.display='none';

    if(document.getElementById("totalBalance")){
      document.getElementById("totalBalance").innerText=`$${session.balance}`;
      document.getElementById("todayProfit").innerText=`$${session.profit}`;
      document.getElementById("activeTrades").innerText=session.trades;
      document.getElementById("botStatus").innerText=session.botRunning ? "Running" : "Stopped";
    }
  }
}

window.addEventListener("load", loadSession);

// ================= SAFE HOOKS INTO ORIGINAL FUNCTIONS =================

// LOGIN HOOK
const _checkLogin = checkLogin;
checkLogin = function(){
  _checkLogin();

  if(loggedIn){
    const user=document.getElementById('loginUsername')?.value || "Admin";
    session.user = user;
    session.isVIP = isVIP;
    saveSession();
  }
}

// VIP HOOK
const _payWithMpesa = payWithMpesa;
payWithMpesa = function(){
  _payWithMpesa();
  session.isVIP = true;
  saveSession();
}

// BOT START HOOK
const _startBot = startBot;
startBot = function(){
  _startBot();
  session.botRunning = true;
  saveSession();
}

// BOT STOP HOOK
const _stopBot = stopBot;
stopBot = function(){
  _stopBot();
  session.botRunning = false;
  saveSession();
}

// SIGNAL HOOK
const _updateBotSignals = updateBotSignals;
updateBotSignals = async function(){
  await _updateBotSignals();

  session.balance = (10000+Math.random()*5000).toFixed(2);
  session.profit = (Math.random()*1000).toFixed(2);
  session.trades = Math.floor(Math.random()*15)+1;

  saveSession();
}

// LOGOUT (NEW ONLY, DOES NOT TOUCH ORIGINAL)
function logout(){
  localStorage.removeItem("gibsonfx_session");
  location.reload();
}

</script></body>
</html>
