<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>

<style>
:root{
 --bg-dark:#0b0f1a; --text-dark:white; --card-dark:#121a2b; --shadow-dark:rgba(0,234,255,0.3);
 --bg-light:#f5f5f5; --text-light:#111; --card-light:#fff; --shadow-light:rgba(0,0,0,0.15);
}

body{
 margin:0; font-family:Arial;
 background:var(--bg-dark); color:var(--text-dark);
 transition:0.4s;
}

/* HEADER */
header{
 display:flex; justify-content:space-between;
 align-items:center; padding:15px 20px;
 background:#050814; flex-wrap:wrap;
}
header img{height:45px;}

nav a{
 margin:5px 10px; cursor:pointer;
 text-decoration:none; font-weight:bold;
}

/* BUTTON */
.toggle-btn{
 position:fixed; top:20px; right:20px;
 background:#00eaff; color:black;
 border:none; padding:10px;
 border-radius:6px; cursor:pointer;
 z-index:1001;
}

/* PAGES */
.page{display:none; padding:20px;}

/* HERO */
.hero{
 display:flex; flex-wrap:wrap;
 justify-content:space-between;
 align-items:center;
}
.hero img{
 max-width:400px; width:100%;
 border-radius:10px;
}
.hero h1{color:#00eaff;}

/* BUTTON */
.btn{
 background:#00eaff; padding:12px;
 border-radius:6px; color:black;
 font-weight:bold; text-decoration:none;
}
.btn:hover{box-shadow:0 0 20px #00eaff;}

/* CARDS */
.stat-card,.bot-box,.market-card,.modal-content{
 background:var(--card-dark);
 padding:15px;
 border-radius:10px;
 box-shadow:0 0 15px var(--shadow-dark);
 margin:10px;
}

/* MARKET */
.market-cards{
 display:flex; flex-wrap:wrap;
 justify-content:center; gap:20px;
}
iframe{width:100%; height:300px; border:none;}

/* TEAM */
.team-container{
 display:flex; flex-wrap:wrap;
 justify-content:center; gap:30px;
}
.team-member{
 width:200px; position:relative;
 border-radius:12px; overflow:hidden;
 box-shadow:0 0 20px #00eaff;
}
.team-member img{width:100%;}
.overlay{
 position:absolute; bottom:0;
 width:100%; background:rgba(0,0,0,0.7);
 color:white; text-align:center;
 padding:10px; opacity:0;
 transition:0.3s;
}
.team-member:hover .overlay{opacity:1;}

/* GALLERY PRO */
.gallery-container{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
 gap:20px;
}
.gallery-item{
 position:relative;
 border-radius:12px;
 overflow:hidden;
 box-shadow:0 0 20px #00eaff;
}
.gallery-item img{
 width:100%; height:220px;
 object-fit:cover;
 transition:0.4s;
}
.gallery-item:hover img{transform:scale(1.1);}
.gallery-item:hover .overlay{opacity:1;}

/* LIGHT MODE */
body.light-mode{
 background:var(--bg-light);
 color:var(--text-light);
}
body.light-mode .stat-card,
body.light-mode .bot-box,
body.light-mode .market-card,
body.light-mode .modal-content{
 background:var(--card-light);
 box-shadow:0 0 15px var(--shadow-light);
 color:var(--text-light);
}

/* MOBILE */
@media(max-width:768px){
 .hero{flex-direction:column; text-align:center;}
 iframe{height:250px;}
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleTheme()">Dark/Light</button>

<header>
<img src="./assets/logo.png">
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Bot</a>
<a onclick="showPage('market')">Market</a>
<a onclick="showPage('gallery')">Gallery</a>
<a onclick="showPage('team')">Team</a>
<a href="https://wa.me/254786810591" target="_blank">VIP</a>
<a id="loginLink">Login</a>
</nav>
</header>

<!-- HOME -->
<section id="home" class="page" style="display:block;">
<div class="hero">
<div>
<h1>GIBSONFX AI BOT</h1>
<p>Automated trading system 24/7</p>
<a href="https://wa.me/254786810591" class="btn">Join VIP</a>
</div>
<img src="./assets/hero.jpg">
</div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
<h1>Dashboard</h1>
<img src="./assets/dashboard-screenshot.png" style="width:100%;max-width:900px;border-radius:12px;">
</section>

<!-- BOT -->
<section id="bot" class="page">
<h1>Bot Control</h1>
<div class="bot-box">
<h2 id="liveSignal">WAIT</h2>
<button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>
</div>
</section>

<!-- MARKET -->
<section id="market" class="page">
<h1>Live Market</h1>
<div class="market-cards">
<div class="market-card"><h3>EURUSD</h3><iframe src="https://s.tradingview.com/widgetembed/?symbol=FX:EURUSD"></iframe></div>
<div class="market-card"><h3>GBPUSD</h3><iframe src="https://s.tradingview.com/widgetembed/?symbol=FX:GBPUSD"></iframe></div>
<div class="market-card"><h3>GOLD</h3><iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD"></iframe></div>
<div class="market-card"><h3>BTC</h3><iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT"></iframe></div>
</div>
</section>

<!-- GALLERY -->
<section id="gallery" class="page">
<h1 style="text-align:center;">Gallery</h1>
<div class="gallery-container">

<div class="gallery-item">
<img src="./assets/director.jpg" onclick="openImage(this.src)">
<div class="overlay">Director</div>
</div>

<div class="gallery-item">
<img src="./assets/trades-example1.png" onclick="openImage(this.src)">
<div class="overlay">Winning Trade</div>
</div>

<div class="gallery-item">
<img src="./assets/trades-example2.png" onclick="openImage(this.src)">
<div class="overlay">Setup</div>
</div>

<div class="gallery-item">
<img src="./assets/profit-summary.png" onclick="openImage(this.src)">
<div class="overlay">Profit</div>
</div>

</div>
</section>

<!-- TEAM -->
<section id="team" class="page">
<h1 style="text-align:center;">Team</h1>
<div class="team-container">

<div class="team-member">
<img src="./assets/director.jpg">
<div class="overlay">Gibson Mugai<br>Director</div>
</div>

<div class="team-member">
<img src="./assets/team2.jpg">
<div class="overlay">Developer</div>
</div>

<div class="team-member">
<img src="./assets/team3.jpg">
<div class="overlay">Marketing</div>
</div>

</div>
</section>

<!-- LOGIN -->
<div id="loginModal" class="modal">
<div class="modal-content">
<span onclick="closeModal()">&times;</span>
<h2>Login</h2>
<input type="password" id="loginPassword">
<button onclick="checkLogin()">Login</button>
</div>
</div>

<footer style="text-align:center; padding:20px;">
© 2026 GIBSONFX
</footer>

<script>
let loggedIn=false;

function showPage(id){
 if(!loggedIn){alert("Login first"); return;}
 document.querySelectorAll('.page').forEach(p=>p.style.display='none');
 document.getElementById(id).style.display='block';
}

function toggleTheme(){
 document.body.classList.toggle("light-mode");
}

function checkLogin(){
 if(document.getElementById('loginPassword').value==="GIBSONFX2026"){
  loggedIn=true;
  closeModal();
  alert("Access granted");
 }
}

function closeModal(){
 document.getElementById('loginModal').style.display="none";
}

document.getElementById('loginLink').onclick=()=>{
 document.getElementById('loginModal').style.display="block";
};

let botInterval;
function startBot(){
 document.getElementById("liveSignal").innerText="RUNNING...";
 botInterval=setInterval(()=>{
  const s=["BUY","SELL","WAIT"][Math.floor(Math.random()*3)];
  const el=document.getElementById("liveSignal");
  el.innerText=s;
  el.style.color=s==="BUY"?"lime":s==="SELL"?"red":"white";
 },2000);
}

function stopBot(){
 clearInterval(botInterval);
 document.getElementById("liveSignal").innerText="STOPPED";
}

function openImage(src){
 window.open(src,'_blank');
}
</script>

</body>
</html>
