<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>
<style>
:root{
    --bg-dark:#0b0f1a; --text-dark:white; --card-dark:#121a2b; --shadow-dark:rgba(0,234,255,0.3);
    --bg-light:#f5f5f5; --text-light:#111; --card-light:#fff; --shadow-light:rgba(0,0,0,0.15);
}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg-dark);color:var(--text-dark);transition:0.4s;}
body.light-mode{background:var(--bg-light);color:var(--text-light);}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#050814;flex-wrap:wrap;transition:0.4s;}
body.light-mode header{background:#e3e3e3;}
header img{height:45px;}
nav a{margin:5px 10px;text-decoration:none;color:inherit;font-weight:bold;cursor:pointer;}
.toggle-btn{position:fixed;top:20px;right:20px;background:#00eaff;color:black;border:none;padding:10px 15px;font-weight:bold;border-radius:5px;cursor:pointer;z-index:1001;}
.page{display:none;padding:20px;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;justify-content:center;align-items:center;}
.modal-content{background:var(--card-dark);padding:20px;border-radius:10px;max-width:400px;width:90%;position:relative;text-align:center;}
.close-btn{position:absolute;top:10px;right:15px;cursor:pointer;font-size:24px;}
.btn{display:inline-block;background:#00eaff;padding:12px 20px;border-radius:6px;margin:5px 0;color:black;font-weight:bold;cursor:pointer;}
</style>
</head>
<body><header>
<img src="./assets/logo.png" alt="Logo">
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Trading Bot</a>
<a onclick="showPage('market')">Market</a>
<a onclick="showPage('market-review')">Market Review</a>
<a onclick="showPage('academy')">Trading Academy</a>
<a onclick="showPage('team')">Team</a>
<a onclick="showPage('gallery')">Gallery</a>
<a onclick="openSignup()">Sign Up</a>
<a onclick="openAdmin()">Admin</a>
<a id="loginLink">Login</a>
</nav>
</header><section id="home" class="page" style="display:block;"><h1>GIBSONFX</h1></section><!-- LOGIN MODAL --><div id="loginModal" class="modal">
<div class="modal-content">
<span class="close-btn" id="closeModal">&times;</span>
<h2>Login</h2>
<input type="password" placeholder="Enter Password" id="loginPassword">
<button class="btn" onclick="checkLogin()">Login</button>
</div>
</div><!-- SIGNUP MODAL --><div id="signupModal" class="modal">
<div class="modal-content">
<span class="close-btn" onclick="closeSignup()">&times;</span>
<h2>Sign Up</h2>
<input id="signupUsername" placeholder="Username"><br><br>
<input id="signupEmail" placeholder="Email"><br><br>
<input id="signupPassword" type="password" placeholder="Password"><br><br>
<button class="btn" onclick="sendCode()">Send Code</button>
<div id="codeBox" style="display:none;">
<input id="confirmCode" placeholder="Enter Code"><br><br>
<button class="btn" onclick="verifyCode()">Verify & Create Account</button>
</div>
</div>
</div><!-- ADMIN PANEL --><section id="admin" class="page">
<h1>Admin Dashboard</h1>
<div id="userList"></div>
</section><script>
let loggedIn=false;
let users = JSON.parse(localStorage.getItem("users") || "[]");
let currentCode="";

// LOGIN
const modal=document.getElementById('loginModal');
document.getElementById('loginLink').onclick=()=>modal.style.display="flex";
document.getElementById('closeModal').onclick=()=>modal.style.display="none";

function checkLogin(){
 const input=document.getElementById('loginPassword').value;

 if(input==="ADMIN123"){
   loggedIn=true;
   alert("Admin login");
   modal.style.display="none";
   showPage("admin");
   loadUsers();
   return;
 }

 const user=users.find(u=>u.password===input);
 if(user){
   loggedIn=true;
   alert("Welcome "+user.username);
   modal.style.display="none";
   showPage("home");
 } else alert("Invalid");
}

// SIGNUP
function openSignup(){document.getElementById("signupModal").style.display="flex";}
function closeSignup(){document.getElementById("signupModal").style.display="none";}

function sendCode(){
 currentCode=Math.floor(100000+Math.random()*900000).toString();
 alert("Code: "+currentCode);
 document.getElementById("codeBox").style.display="block";
}

function verifyCode(){
 if(document.getElementById("confirmCode").value!==currentCode){alert("Wrong code");return;}
 const user={
  username:document.getElementById("signupUsername").value,
  email:document.getElementById("signupEmail").value,
  password:document.getElementById("signupPassword").value
 };
 users.push(user);
 localStorage.setItem("users",JSON.stringify(users));
 alert("Account created");
 closeSignup();
}

// ADMIN
function openAdmin(){if(!loggedIn){alert("Login first");return;} showPage("admin"); loadUsers();}
function loadUsers(){
 const box=document.getElementById("userList");
 box.innerHTML="";
 users.forEach(u=>{
  box.innerHTML+=`<p>${u.username} - ${u.email}</p>`;
 });
}

// NAV
function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.style.display='none');
 document.getElementById(id).style.display='block';
}
</script></body>
</html>
