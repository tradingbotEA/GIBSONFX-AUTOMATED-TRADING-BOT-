<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>
<style>
:root{
    --bg-dark:#0b0f1a; --text-dark:white; --card-dark:#121a2b; --shadow-dark:rgba(0,234,255,0.3);
    --bg-light:#f5f5f5; --text-light:#111; --card-light:#fff; --shadow-light:rgba(0,0,0,0.15);
}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg-dark);color:var(--text-dark);transition:0.4s;}
body.light-mode{background:var(--bg-light);color:var(--text-light);}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:#050814;flex-wrap:wrap;position:relative;}
body.light-mode header{background:#e3e3e3;}
header img{height:45px;}nav{display:flex;flex-wrap:wrap;gap:10px;align-items:center;} nav a, nav span{margin:5px;text-decoration:none;color:inherit;font-weight:bold;cursor:pointer;}

.menu-toggle{display:none;font-size:26px;cursor:pointer;} @media(max-width:768px){ nav{ display:none; flex-direction:column; position:absolute; top:60px; left:0; width:100%; background:#050814; padding:10px; z-index:999; } body.light-mode nav{background:#e3e3e3;} nav.active{display:flex;} .menu-toggle{display:block;} }

.toggle-btn{position:fixed;top:20px;right:20px;background:#00eaff;color:black;border:none;padding:10px;border-radius:5px;cursor:pointer;z-index:1001;} .page{display:none;padding:20px;}

.hero{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:20px;} .hero img{width:100%;max-width:400px;border-radius:10px;} .hero h1{font-size:36px;color:#00eaff;}

.stats{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-top:20px;} .stat-card{width:180px;background:var(--card-dark);padding:15px;border-radius:10px;box-shadow:0 0 15px var(--shadow-dark);text-align:center;}

.market-cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;} .market-card{background:var(--card-dark);padding:15px;border-radius:10px;box-shadow:0 0 15px var(--shadow-dark);} iframe{width:100%;height:250px;border:none;}

.team-container{display:flex;flex-wrap:wrap;justify-content:center;gap:30px;} .team-member{position:relative;width:180px;border-radius:12px;overflow:hidden;box-shadow:0 0 20px #00eaff;} .team-member img{width:100%;} .overlay{position:absolute;bottom:0;width:100%;background:rgba(0,0,0,0.7);color:white;text-align:center;opacity:0;transition:0.3s;} .team-member:hover .overlay{opacity:1;}

.gallery-cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;} .gallery-cards img{max-width:250px;border-radius:10px;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;} .modal-content{background:var(--card-dark);padding:20px;border-radius:10px;width:90%;max-width:400px;}

</style>
</head>
<body><button class="toggle-btn" onclick="toggleTheme()">Mode</button>

<header>
<img src="./assets/logo.png">
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav id="navMenu">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Bot</a>
<a onclick="showPage('market')">Market</a>
<a onclick="showPage('market-review')">Review</a>
<a onclick="showPage('academy')">Academy</a>
<a onclick="showPage('team')">Team</a>
<a onclick="showPage('gallery')">Gallery</a>
<a id="loginLink">Login</a>
<a id="signupLink">Sign Up</a>
<span id="userDisplay" style="display:none;"></span>
</nav>
</header><section id="home" class="page" style="display:block;">
<div class="hero">
<div>
<h1>GIBSONFX AI Trading Bot</h1>
<p>Automated AI trading 24/7</p>
</div>
<img src="./assets/hero.jpg">
</div>
</section><section id="dashboard" class="page">
<h1>Dashboard</h1>
<div class="stats">
<div class="stat-card">Balance <h2 id="totalBalance">$0</h2></div>
<div class="stat-card">Profit <h2 id="todayProfit">$0</h2></div>
<div class="stat-card">Trades <h2 id="activeTrades">0</h2></div>
<div class="stat-card">Status <h2 id="botStatus">Stopped</h2></div>
</div>
</section><section id="bot" class="page">
<h1>Bot</h1>
<select id="marketSelect" multiple>
<option>EURUSD</option>
<option>GBPUSD</option>
<option>BTCUSD</option>
</select><br><br>
<button onclick="startBot()">Start</button>
<button onclick="stopBot()">Stop</button>
</section><section id="market" class="page">
<h1>Charts</h1>
<div class="market-cards">
<div class="market-card"><iframe src="https://s.tradingview.com/widgetembed/?symbol=FX:EURUSD"></iframe></div>
<div class="market-card"><iframe src="https://s.tradingview.com/widgetembed/?symbol=FX:GBPUSD"></iframe></div>
</div>
</section><section id="market-review" class="page">
<h1>Signals</h1>
<p id="eurusdSignal">WAIT</p>
<p id="gbpusdSignal">WAIT</p>
<p id="btcusdSignal">WAIT</p>
</section><section id="academy" class="page"><h1>Academy</h1></section><section id="team" class="page">
<h1>Team</h1>
<div class="team-container">
<div class="team-member"><img src="./assets/director.jpg"><div class="overlay">Gibson</div></div>
</div>
</section><section id="gallery" class="page">
<h1>Gallery</h1>
<div class="gallery-cards">
<img src="./assets/bot.jpg">
<img src="./assets/signals.jpg">
</div>
</section><div id="loginModal" class="modal">
<div class="modal-content">
<h2>Login</h2>
<input id="loginUsername" placeholder="Username"><br><br>
<input id="loginPassword" type="password"><br><br>
<button onclick="checkLogin()">Login</button>
</div>
</div><div id="signupModal" class="modal">
<div class="modal-content">
<h2>Sign Up</h2>
<input id="signupUsername"><br><br>
<input id="signupPassword" type="password"><br><br>
<button onclick="registerUser()">Sign Up</button>
</div>
</div><script>
let loggedIn=false,light=false,botInt;

function toggleTheme(){light=!light;document.body.classList.toggle('light-mode',light);}
function toggleMenu(){navMenu.classList.toggle('active');}
function showPage(p){document.querySelectorAll('.page').forEach(pg=>pg.style.display='none');document.getElementById(p).style.display='block';navMenu.classList.remove('active');}

loginLink.onclick=()=>loginModal.style.display='flex';
signupLink.onclick=()=>signupModal.style.display='flex';

function registerUser(){localStorage.setItem(signupUsername.value,signupPassword.value);alert('done');signupModal.style.display='none';}
function checkLogin(){let u=loginUsername.value,p=loginPassword.value;if(localStorage.getItem(u)===p){loggedIn=true;userDisplay.innerText='👤 '+u;userDisplay.style.display='inline';loginLink.style.display='none';signupLink.style.display='none';loginModal.style.display='none';}else alert('wrong');}

function startBot(){botStatus.innerText='Running';botInt=setInterval(()=>{totalBalance.innerText='$'+(10000+Math.random()*1000).toFixed(2);todayProfit.innerText='$'+(Math.random()*500).toFixed(2);activeTrades.innerText=Math.floor(Math.random()*10);['eurusd','gbpusd','btcusd'].forEach(m=>{document.getElementById(m+'Signal').innerText=['BUY','SELL','WAIT'][Math.floor(Math.random()*3)];});},2000);}
function stopBot(){botStatus.innerText='Stopped';clearInterval(botInt);} 
</script></body>
</html>
