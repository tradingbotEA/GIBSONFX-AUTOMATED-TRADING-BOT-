<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIBSONFX Trading Platform</title>
<style>
:root{
    --bg-dark: #0b0f1a; --text-dark: white; --card-dark: #121a2b; --shadow-dark: rgba(0,234,255,0.3);
    --bg-light: #f5f5f5; --text-light: #111; --card-light: #fff; --shadow-light: rgba(0,0,0,0.15);
}
body{margin:0; font-family:Arial,sans-serif; background:var(--bg-dark); color:var(--text-dark); transition:0.4s;}
body.light-mode{background:var(--bg-light); color:var(--text-light);}
header{display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:#050814; flex-wrap:wrap; transition:0.4s;}
body.light-mode header{background:#e3e3e3;}
header img{height:45px;}
nav a{margin:5px 10px; text-decoration:none; color:inherit; font-weight:bold; cursor:pointer;}
.toggle-btn{position:fixed; top:20px; right:20px; background:#00eaff; color:black; border:none; padding:10px 15px; font-weight:bold; border-radius:5px; cursor:pointer; z-index:1001;}
.menu-btn{display:none; position:fixed; top:20px; right:70px; background:#00eaff; color:black; border:none; padding:10px 15px; font-weight:bold; border-radius:5px; cursor:pointer; z-index:1001;}
.page{display:none; padding:20px;}
.hero{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; margin-bottom:20px;}
.hero img{width:100%; max-width:400px; border-radius:10px;}
.hero h1{font-size:36px; color:#00eaff;}
body.light-mode .hero h1{color:#00bfff;}
.btn{display:inline-block; background:#00eaff; padding:12px 20px; border-radius:6px; margin:5px 0; color:black; font-weight:bold; text-decoration:none; transition:0.3s; cursor:pointer;}
.btn:hover{box-shadow:0 0 20px #00eaff; transform:scale(1.05);}
.stats{display:flex; flex-wrap:wrap; justify-content:center; gap:20px; margin-top:20px;}
.stat-card{width:180px; background:var(--card-dark); padding:15px; border-radius:10px; box-shadow:0 0 15px var(--shadow-dark); text-align:center;}
body.light-mode .stat-card{background:var(--card-light); box-shadow:0 0 15px var(--shadow-light);}
.bot-box, .market-card, .card, .modal-content, .gallery-card{background:var(--card-dark); box-shadow:0 0 15px var(--shadow-dark); border-radius:10px; padding:15px; margin-bottom:20px;}
body.light-mode .bot-box, body.light-mode .market-card{background:var(--card-light); box-shadow:0 0 15px var(--shadow-light);}
.market-cards, .gallery-cards{display:flex; flex-wrap:wrap; justify-content:center; gap:20px;}
.market-card iframe{width:100%; height:400px;}
.gallery-cards img{width:100%; max-width:300px; border-radius:10px; cursor:pointer; transition:0.3s;}
.gallery-cards img:hover{transform:scale(1.05); box-shadow:0 0 20px #00eaff;}
.team-container{display:flex; flex-wrap:wrap; justify-content:center; gap:40px;}
.team-member{position:relative; width:180px; text-align:center; border-radius:12px; overflow:hidden; box-shadow:0 0 20px #00eaff; transition:transform 0.3s;}
.team-member:hover{transform:scale(1.05);}
.team-member img{width:100%; border-radius:12px;}
.overlay{position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.7); color:white; padding:10px; text-align:center; opacity:0; transition:opacity 0.3s;}
.team-member:hover .overlay{opacity:1;}
body.light-mode .team-member{box-shadow:0 0 20px rgba(0,0,0,0.2);}
body.light-mode .overlay{background: rgba(255,255,255,0.8); color:#111;}
.modal{display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; justify-content:center; align-items:center;}
.modal-content{background:var(--card-dark); padding:20px; border-radius:10px; max-width:600px; width:90%; position:relative; text-align:center;}
body.light-mode .modal-content{background:var(--card-light);}
.close-btn{position:absolute; top:10px; right:15px; cursor:pointer; font-size:24px;}
.certificate-img{width:100%; max-width:400px; border-radius:10px; margin-top:15px;}
.fullscreen-btn{margin-top:10px;}
@media screen and (max-width:768px){.hero{flex-direction:column; text-align:center;}.hero img{max-width:90%; margin-top:20px;}.stats{flex-direction:column; align-items:center;}.stat-card{width:90%; max-width:300px;}.market-cards, .gallery-cards{flex-direction:column; align-items:center;}.menu-btn{display:block;}}
@media screen and (max-width:480px){header{flex-direction:column; align-items:flex-start;} nav{display:none; flex-wrap:wrap; gap:5px; margin-top:10px;} nav.show{display:flex;}.hero h1{font-size:28px;} .btn{padding:10px 18px;} iframe{height:200px;}}
</style>
</head>
<body><button class="toggle-btn" onclick="toggleTheme()">Dark/Light Mode</button> <button class="menu-btn" onclick="toggleMenu()">Menu</button>

<header>
<img src="./assets/logo.png" alt="Logo">
<nav id="navMenu">
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('bot')">Trading Bot</a>
<a onclick="showPage('market')">Market</a>
<a onclick="showPage('market-review')">Market Review</a>
<a onclick="showPage('academy')">Trading Academy</a>
<a onclick="showPage('team')">Team</a>
<a onclick="showPage('gallery')">Gallery</a>
<a href="https://wa.me/254786810591" target="_blank">VIP Signals</a>
<a id="loginLink">Login</a>
</nav>
</header><!-- Pages HTML unchanged --><script>
let loggedIn=false, isVIP=false, light=false;
const modal=document.getElementById('loginModal');
const navMenu=document.getElementById('navMenu');
function toggleMenu(){ navMenu.classList.toggle('show'); }
function toggleTheme(){ light=!light; document.body.classList.toggle('light-mode', light); }
document.getElementById('loginLink').onclick=()=>modal.style.display="flex";
document.getElementById('closeModal').onclick=()=>modal.style.display="none";
function checkLogin(){ const pass=document.getElementById('loginPassword').value; if(pass==="GIBSONFX2026"){ loggedIn=true; modal.style.display="none"; alert("Login successful!"); showPage('home'); } else alert("Incorrect password!"); }
function showPage(id){ if(!loggedIn){alert("Please login first!"); return;} document.querySelectorAll('.page').forEach(p=>p.style.display='none'); document.getElementById(id).style.display='block'; }

// Bot and Dashboard
let botInterval, dashboard={balance:100, trades:0, journal:[]};
async function getAISignal(symbol){ const s=["BUY","SELL","WAIT"]; return s[Math.floor(Math.random()*s.length)]; }
async function updateDashboard(){ if(!isVIP) return; dashboard.balance=(dashboard.balance*(1+(Math.random()-0.5)/20)).toFixed(2); dashboard.trades=Math.floor(Math.random()*10)+1; document.getElementById("totalBalance").innerText=`$${dashboard.balance}`; document.getElementById("todayProfit").innerText=`${(dashboard.balance-100).toFixed(2)} USD (${((dashboard.balance-100)/100*100).toFixed(2)}%)`; document.getElementById("activeTrades").innerText=dashboard.trades; }
async function updateMarketSignals(){ const symbols=["EURUSD","GBPUSD","XAUUSD","BTCUSD"]; for(let s of symbols){ const sig=await getAISignal(s); const el=document.getElementById(s.toLowerCase()+"Signal"); if(el){ el.innerText=sig; el.style.color=sig==="BUY"?"lime":sig==="SELL"?"red":"white"; dashboard.journal.unshift({symbol:s, signal:sig, time:new Date().toLocaleTimeString()}); if(dashboard.journal.length>50) dashboard.journal.pop(); } } updateDashboard(); }
function startBot(){ if(!loggedIn){alert("Please login first!"); return;} if(!isVIP){ alert("VIP required"); return;} document.getElementById("botStatus").innerText="Running"; botInterval=setInterval(updateMarketSignals,2000); }
function stopBot(){ clearInterval(botInterval); document.getElementById("botStatus").innerText="Stopped"; document.querySelectorAll('#liveSignal').forEach(el=>el.innerText="WAIT"); }
updateMarketSignals();
</script></body>
</html>
